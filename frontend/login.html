<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growthwick Advisor — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .logo span { color: #6366f1; }

    .tagline {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #6366f1; }

    button {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    button:hover { background: #5558e3; }
    button:disabled { background: #3d3f6b; cursor: not-allowed; }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Growth<span>wick</span> Advisor</div>
    <div class="tagline">16 expert personas · Citations required</div>

    <div class="error" id="errorMsg">Invalid username or password.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" id="submitBtn">Sign in</button>
    </form>
  </div>

  <script>
    // Show error if redirected with ?error=1
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('errorMsg').classList.add('visible');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const form = new FormData(e.target);
      const resp = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(form),
        credentials: 'same-origin'
      });

      if (resp.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('errorMsg').classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
